<style>
  :root{
    --bg:#13110d;            
    --bg2:#181510;
    --ink:#f1ece1;           
    --muted:#9c948372;       
    --muted2:#a99f8c;        
    --gold:#c9a24b;          
    --gold-soft:#d8be86;
    --line:#2b261d;          
    --line-soft:#221e17;
    --blue:#2e9ac4;
    --red:#d8443f;
    --serif:"Cormorant Garamond",Georgia,serif;
    --sans:"Jost",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html{scroll-behavior:smooth}
  body{
    background:var(--bg);color:var(--ink);font-family:var(--sans);font-weight:300;
    line-height:1.5;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
    padding-bottom:60px;overflow-x:hidden;
  }

  
  .hero{
    position:relative;text-align:center;
    padding:54px 24px 30px;
    background:
      radial-gradient(130% 90% at 50% 0%, rgba(201,162,75,.10), transparent 62%),
      linear-gradient(180deg,#161309 0%, var(--bg) 100%);
    border-bottom:1px solid var(--line);
  }
  .logo{
    width:min(82%,330px);height:auto;display:block;margin:0 auto 6px;
    filter:drop-shadow(0 6px 26px rgba(0,0,0,.5));
  }
  .estd{
    font-family:var(--serif);font-style:italic;font-size:15px;color:var(--gold-soft);
    letter-spacing:.04em;margin-top:4px;
  }
  .hero-sub{
    margin-top:14px;font-size:10.5px;letter-spacing:.42em;text-transform:uppercase;
    color:var(--muted2);font-weight:400;
  }

  
  .lang{
    position:absolute;top:18px;right:18px;z-index:6;display:flex;gap:2px;
    font-family:var(--sans);
  }
  .lang button{
    background:rgba(255,255,255,.04);border:1px solid #4a4334;color:#d8cdb4;
    font:inherit;font-size:12px;font-weight:500;letter-spacing:.14em;
    padding:7px 13px;cursor:pointer;transition:.2s;border-radius:3px;
  }
  .lang button:not(.active):hover{border-color:var(--gold);color:var(--gold-soft)}
  .lang button.active{background:var(--gold);border-color:var(--gold);color:#1a160e;font-weight:600;box-shadow:0 2px 10px rgba(201,162,75,.3)}

  
  .catbar{
    position:sticky;top:0;z-index:20;
    background:rgba(19,17,13,.93);backdrop-filter:blur(12px);
    border-bottom:1px solid var(--line);
    display:flex;gap:0;overflow-x:auto;scrollbar-width:none;
    padding:0 8px;
  }
  .catbar::-webkit-scrollbar{display:none}
  .catbar a{
    flex:0 0 auto;color:var(--muted2);text-decoration:none;
    font-family:var(--sans);font-size:11px;font-weight:400;
    letter-spacing:.18em;text-transform:uppercase;
    padding:15px 15px 13px;white-space:nowrap;transition:.2s;
    border-bottom:2px solid transparent;position:relative;
  }
  .catbar a.active{color:var(--gold-soft);border-bottom-color:var(--gold)}

  
  main{max-width:640px;margin:0 auto;padding:0 26px}
  .section{padding-top:42px;scroll-margin-top:58px}
  .section:first-child{padding-top:34px}
  .sec-head{text-align:center;margin-bottom:24px}
  .sec-head h2{
    font-family:var(--serif);font-weight:600;font-size:30px;letter-spacing:.01em;
    color:var(--ink);line-height:1.1;
  }
  .sec-head .en{
    display:block;font-family:var(--sans);font-size:9.5px;font-weight:400;
    letter-spacing:.34em;text-transform:uppercase;color:var(--gold);
    margin-top:7px;opacity:.85;
  }
  .sec-head .ornament{
    display:inline-block;margin-top:11px;color:var(--gold);font-size:13px;letter-spacing:.3em;opacity:.6;
  }

  
  .item{
    display:flex;align-items:baseline;gap:12px;
    padding:11px 0;border-bottom:1px solid var(--line-soft);
  }
  .item:last-child{border-bottom:0}
  .item .name{
    font-family:var(--serif);font-size:19px;font-weight:500;color:var(--ink);
    flex:0 1 auto;letter-spacing:.005em;
  }
  .item .sz{
    font-family:var(--sans);font-size:12.5px;color:var(--gold-soft);font-weight:400;
    margin-left:8px;letter-spacing:.04em;text-transform:uppercase;opacity:.9;
  }
  .item .dots{
    flex:1 1 auto;min-width:16px;align-self:center;height:1px;
    background-image:radial-gradient(circle, var(--line) 1px, transparent 1px);
    background-size:6px 1px;background-repeat:repeat-x;background-position:bottom;
    opacity:.8;transform:translateY(2px);
  }
  .item .price{
    flex:0 0 auto;font-family:var(--sans);font-size:16px;font-weight:500;
    color:var(--gold-soft);font-variant-numeric:tabular-nums;white-space:nowrap;letter-spacing:.01em;
  }
  .item .price .cur{font-family:var(--sans);font-size:11px;color:var(--muted2);font-weight:400;margin-left:4px;letter-spacing:.05em}

  
  footer{
    max-width:640px;margin:54px auto 0;padding:34px 26px 0;
    border-top:1px solid var(--line);text-align:center;
  }
  footer .flogo{width:118px;height:auto;margin:0 auto 16px;opacity:.95}
  footer .contact{font-family:var(--sans);font-weight:300;font-size:13px;color:var(--muted2);line-height:2.1;letter-spacing:.03em}
  footer .contact a{color:var(--ink);text-decoration:none}
  footer .label{font-size:9.5px;letter-spacing:.26em;text-transform:uppercase;color:var(--gold);display:block;margin-top:14px;margin-bottom:1px;opacity:.8}
  .credit{margin-top:24px;font-size:10px;color:#5d564a;letter-spacing:.06em;font-family:var(--sans)}

  @media (max-width:380px){
    .item .name,.item .price{font-size:17px}
    .sec-head h2{font-size:26px}
  }

  
  @media (min-width:900px){
    body{padding-bottom:80px}
    .hero{padding:64px 24px 40px}
    .logo{width:340px}
    .catbar{justify-content:center;padding:0 24px}
    .catbar a{padding:18px 20px 16px;font-size:11.5px}
    main{max-width:1080px;padding:0 48px;column-count:2;column-gap:64px;}
    .section{break-inside:avoid;-webkit-column-break-inside:avoid;page-break-inside:avoid;padding-top:0;margin-top:46px;}
    .section:first-child{margin-top:38px}
    .section.wide{column-span:all;-webkit-column-span:all}
    .section.wide .items-grid{column-count:2;column-gap:64px}
    .section.wide .items-grid .item{break-inside:avoid}
    .item{transition:padding-left .18s ease, border-color .18s ease}
    .item:hover{padding-left:6px;border-bottom-color:var(--gold)}
    .item:hover .name{color:#fff}
    .sec-head h2{font-size:33px}
    footer{max-width:1080px;padding:46px 48px 0}
    .item .name{font-size:18px}
    .item .price{font-size:16px}
  }
  @media (min-width:1280px){
    main{max-width:1180px}
    .hero{padding:72px 24px 44px}
  }

</style>

let lang="sq";
let navLock=false, navLockTimer=null;
const menuEl=document.getElementById("menu");
const catbarEl=document.getElementById("catbar");

function render(){
  menuEl.innerHTML="";catbarEl.innerHTML="";
  menu.forEach(sec=>{
    const a=document.createElement("a");
    a.href="#"+sec.id;a.dataset.target=sec.id;
    a.textContent=lang==="sq"?sec.sq:sec.en;
    a.onclick=(e)=>{
      e.preventDefault();
      navLock=true;
      
      [...catbarEl.querySelectorAll("a")].forEach(c=>c.classList.toggle("active",c===a));
      a.scrollIntoView({behavior:"smooth",inline:"center",block:"nearest"});
      const target=document.getElementById(sec.id);
      if(target) target.scrollIntoView({behavior:"smooth",block:"start"});
      clearTimeout(navLockTimer);
      navLockTimer=setTimeout(()=>{navLock=false;},900);
    };
    catbarEl.appendChild(a);

    const s=document.createElement("section");
    s.className="section";s.id=sec.id;
    if(sec.items.length>=10) s.classList.add("wide");
    s.innerHTML=`<div class="sec-head"><h2>${lang==="sq"?sec.sq:sec.en}</h2></div>`;
    const host = sec.items.length>=10 ? (()=>{const g=document.createElement("div");g.className="items-grid";s.appendChild(g);return g;})() : s;
    sec.items.forEach(it=>{
      const row=document.createElement("div");row.className="item";
      const nm=lang==="sq"?it.sq:it.en;
      const sz=it.sz?`<span class="sz">${it.sz}</span>`:"";
      row.innerHTML=`<span class="name">${nm}${sz}</span><span class="dots"></span><span class="price">${it.p}<span class="cur">${CUR}</span></span>`;
      host.appendChild(row);
    });
    menuEl.appendChild(s);
  });
  document.querySelectorAll("[data-sq]").forEach(el=>{el.textContent=lang==="sq"?el.dataset.sq:el.dataset.en;});
  document.documentElement.lang=lang;
  setupObserver();
}
function setLang(l){lang=l;document.getElementById("btn-sq").classList.toggle("active",l==="sq");document.getElementById("btn-en").classList.toggle("active",l==="en");render();}
let observer;
function setupObserver(){
  if(observer)observer.disconnect();
  const chips=[...catbarEl.querySelectorAll("a")];
  observer=new IntersectionObserver((entries)=>{
    if(navLock) return;
    entries.forEach(en=>{if(en.isIntersecting){const id=en.target.id;chips.forEach(c=>{const on=c.dataset.target===id;c.classList.toggle("active",on);if(on)c.scrollIntoView({behavior:"smooth",inline:"center",block:"nearest"});});}});
  },{rootMargin:"-50px 0px -78% 0px",threshold:0});
  menu.forEach(sec=>{const el=document.getElementById(sec.id);if(el)observer.observe(el);});
}
render();
